<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DATATHON</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <div class="sidebar">
      <h2></h2>

      <ul>
        <li class="active">Dashboard</li>
        <li>Analytics</li>
        <li>Hotspots</li>
        <li>Criminal Network</li>
        <li>Reports</li>
        <li>Settings</li>
      </ul>
    </div>

    <div class="main">
      <div class="topbar">
        <input type="text" placeholder="Search crimes, FIRs, locations..." />

        <div class="profile">
          <img src="profile.jpg" alt="Profile Picture" />
          <span>Admin</span>
        </div>
      </div>

      <div class="cards">
        <div class="glass-card">
          <h4>Total Crimes</h4>
          <h1></h1>
          <span></span>
        </div>

        <div class="glass-card">
          <h4>Hotspots</h4>
          <h1></h1>
          <span></span>
        </div>

        <div class="glass-card">
          <h4>Repeat Offenders</h4>
          <h1></h1>
          <span></span>
        </div>

        <div class="glass-card">
          <h4>Risk Score</h4>
          <h1></h1>
          <span></span>
        </div>
      </div>

      <div class="grid">
        <div class="glass-panel large">
          <h3>Crime Analytics</h3>
        </div>

        <div class="glass-panel">
          <h3>AI Insights</h3>

          <p></p>
          <p></p>
          <p></p>
        </div>

        <div class="glass-panel">
          <h3>District Statistics</h3>
        </div>

        <div class="glass-panel">
          <h3>Risk Prediction</h3>
        </div>
      </div>
    </div>
  </body>
</html>
